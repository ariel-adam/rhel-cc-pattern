# rhel-cc-pattern inventory
#
# IP addresses are NOT stored here — they are populated automatically:
#   - By aap-setup.sh when bootstrapping (placeholder hosts created)
#   - By playbooks 01/04 after VMs are provisioned
#
# To use a static inventory (e.g. for direct ansible-playbook runs):
#   Copy this file to inventory/hosts.local.ini and fill in real IPs.
#   Add inventory/hosts.local.ini to .gitignore — never commit real IPs.

[aap_controllers]
agof-aap-node ansible_host=REPLACE_WITH_YOUR_AAP_IP ansible_user=azureuser

[attestation_servers]
attestation-server ansible_host=REPLACE_AFTER_PROVISIONING

[standard_vms]
standard-vm ansible_host=REPLACE_AFTER_PROVISIONING

[rhel_cvms_secure]
rhel-cvm-secure ansible_host=REPLACE_AFTER_PROVISIONING

[rhel_cvms_insecure]
rhel-cvm-insecure ansible_host=REPLACE_AFTER_PROVISIONING

[rhel_cvms:children]
rhel_cvms_secure
rhel_cvms_insecure

[all:vars]
ansible_user=azureuser
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ControlMaster=no'
ansible_remote_tmp=/tmp/.ansible
