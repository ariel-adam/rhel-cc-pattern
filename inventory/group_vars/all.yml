---
# Global variables for all hosts in rhel-cc-pattern
#
# ⚠️  DO NOT put credentials or secrets here — this file is committed to Git.
#
# The following variables must be set in your AAP Inventory variables
# (AAP → Inventories → rhel-cc-pattern → Variables) or passed as
# extra vars. They are NOT stored in this file.
#
# Required in AAP inventory variables:
#   vm_ssh_pubkey:         "ssh-rsa AAAA..."  # content of ~/.ssh/id_rsa.pub
#   aap_controller_url:    "https://<aap-ip>"
#   aap_admin_user:        "admin"
#   aap_admin_password:    "<your-aap-password>"
#   aap_inventory_id_num:  "2"               # populated by aap-setup.sh
#   kbs_ca_cert:           |                 # auto-populated by playbook 03
#     -----BEGIN CERTIFICATE-----
#     ...
#
# The aap-setup.sh script sets all of these automatically.

ansible_user: azureuser
ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ControlMaster=no'
ansible_remote_tmp: /tmp/.ansible

# Azure resource group and region — safe to commit, not sensitive
resource_group: rhel-cc-pattern-rg
location: eastus

# AAP connection (comments only — actual values set in AAP, not here)
# aap_controller_url: "https://<set-in-aap-inventory>"
# aap_admin_user: "admin"
# aap_admin_password: "<set-in-aap-inventory>"
# aap_inventory_id_num: "<set-by-aap-setup.sh>"
